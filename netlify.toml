[build]
  command = "npm ci --include=dev && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # include devDependencies and verbose install logs (helps debug build failures)
  NPM_FLAGS = "--include=dev --loglevel verbose"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
