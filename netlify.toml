[build]
  # Prints versions (to surface real errors) then builds
  command = "npm ci && node -e \"console.log('Node',process.version)\" && npx vite --version && npx rollup --version && npm run build"
  publish = "dist"   # Vite output folder

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"
  # Optional if memory errors appear:
  # NODE_OPTIONS = "--max_old_space_size=2048"

# SPA - Always serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
